{% extends "base.html" %}

{% block content %}
  <section class="panel">
    <div class="panel-header">
      <h2>Админ-панель</h2>
    </div>
    <div class="admin-grid">
      <a class="admin-card" href="{{ url_for('admin_users') }}">Пользователи</a>

      <a class="admin-card" href="{{ url_for('admin_promocodes') }}">Промокоды</a>

      </form>
</div>
  </section>
